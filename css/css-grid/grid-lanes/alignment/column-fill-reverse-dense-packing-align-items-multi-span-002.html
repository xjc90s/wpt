<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CSS Grid Lanes Test: fill-reverse with stacking axis alignment applied to dense-packed items where a multi-span item splits track openings</title>
  <link rel="author" title="Celeste Pan" href="mailto:celestepan@microsoft.com">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3/#alignment">
  <link rel="help" href="https://drafts.csswg.org/css-grid-3/#grid-lanes-dense-packing">
  <link rel="match" href="column-fill-reverse-dense-packing-align-items-multi-span-002-ref.html">
  <style>
    html, body {
      color: black; background-color: white; font: 16px/1 monospace; padding: 0; margin: 0;
    }

    .grid-lanes {
      display: grid-lanes;
      grid-template-columns: repeat(5, 80px);
      grid-lanes-direction: column fill-reverse;
      grid-lanes-pack: dense;
      padding: 2px;
      margin: 5px;
    }

    item {
      display: block;
      color: white;
    }
  </style>
</head>
<body>

<div class="grid-lanes" style="align-items: center;">
  <item style="height: 100px; background: salmon;">1</item>
  <item style="height: 100px; background: salmon; grid-column: 2;">2</item>
  <item style="height: 40px; background: salmon; grid-column: 3;">3</item>
  <item style="height: 40px; background: salmon; grid-column: 4;">4</item>
  <item style="height: 200px; background: salmon; grid-column: 5;">5</item>
  <item style="height: 40px; background: salmon; grid-column: 1 / span 5;">6</item>
  <item style="height: 20px; background: darkgreen; grid-column: 1 / span 4;">7</item>
  <item style="height: 20px; background: darkgreen; grid-column: 3 / span 2;">8</item>
  <item style="height: 20px; background: yellow; grid-column: span 2;">9</item>
</div>

<div class="grid-lanes" style="align-items: stretch;">
  <item style="height: 100px; background: salmon;">1</item>
  <item style="height: 100px; background: salmon; grid-column: 2;">2</item>
  <item style="height: 40px; background: salmon; grid-column: 3;">3</item>
  <item style="height: 40px; background: salmon; grid-column: 4;">4</item>
  <item style="height: 200px; background: salmon; grid-column: 5;">5</item>
  <item style="height: 40px; background: salmon; grid-column: 1 / span 5;">6</item>
  <item style="background: darkgreen; grid-column: 1 / span 4;">7</item>
  <item style="height: 20px; background: darkgreen; grid-column: 3 / span 2;">8</item>
  <item style="background: yellow; grid-column: span 2;">9</item>
</div>

</body>
</html>
