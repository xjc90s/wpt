<!DOCTYPE html>
<html>
<head>
<style>
.group {
  border: solid black 1px;
  padding: 20px;
  margin: 10px;
  width: max-content;
}
.outer {
  vertical-align: 20px;
  display: inline-block;
}
.container {
  width: 20px;
  height: 20px;
}
.container-zoom {
  width: 40px;
  height: 40px;
}
.spacer {
  display: inline-block;
  width: 20px;
}
</style>
</head>
<body>
<p>Each grouping below should have two matching boxes.</p>
<div class="group">
  <div class="outer">
    <img class="container" src="/images/green.png" style="vertical-align: 20px;">
  </div>
  <div class="spacer"></div>
  <div class="outer">
    <img class="container" src="/images/green.png" style="vertical-align: 20px;">
  </div>
</div>
<div class="group">
  <div class="outer">
    <img class="container-zoom" src="/images/green.png" style="vertical-align: 40px;">
  </div>
  <div class="spacer"></div>
  <div class="outer">
    <img class="container-zoom" src="/images/green.png" style="vertical-align: 40px;">
  </div>
</div>
</body>
</html>
