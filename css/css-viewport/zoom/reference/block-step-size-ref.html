<!DOCTYPE html>
<html>
<head>
<style>
.group {
  border: solid black 1px;
  padding: 20px;
  margin: 10px;
  width: max-content;
}
.outer {
  block-step-size: 50px;
  display: inline-block;
  width: 100px;
  border: solid black 1px;
}
.spacer {
  display: inline-block;
  width: 20px;
}
</style>
</head>
<body>
<p>Each grouping below should have two matching boxes.</p>
<div class="group">
  <div class="outer">
    <div class="container" style="height: 100px;">
    </div>
  </div>
  <div class="spacer"></div>
  <div class="outer">
    <div class="container" style="height: 100px;">
    </div>
  </div>
</div>
<div class="group">
  <div class="outer">
    <div class="container" style="height: 200px;">
    </div>
  </div>
  <div class="spacer"></div>
  <div class="outer">
    <div class="container" style="height: 200px;">
    </div>
  </div>
</div>
</body>
</html>
