<!DOCTYPE html>
<html>
<head>
<style>
.group {
  border: solid black 1px;
  padding: 20px;
  margin: 10px;
  width: max-content;
}
.outer {
  display: inline-block;
}
.container {
  background-color: black;
  height: 20px;
}
.container-zoom {
  background-color: black;
  height: 40px;
}
.spacer {
  display: inline-block;
  width: 20px;
}
</style>
</head>
<body>
<p>Each grouping below should have two matching boxes.</p>
<div class="group">
  <div class="outer">
    <div class="container" style="width: 100px;"></div>
  </div>
  <div class="spacer"></div>
  <div class="outer">
    <div class="container" style="width: 100px;"></div>
  </div>
</div>
<div class="group">
  <div class="outer">
    <div class="container-zoom" style="width: 200px;"></div>
  </div>
  <div class="spacer"></div>
  <div class="outer">
    <div class="container-zoom" style="width: 200px;"></div>
  </div>
</div>
</body>
</html>
