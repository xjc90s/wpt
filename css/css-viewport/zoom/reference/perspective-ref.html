<!DOCTYPE html>
<html>
<head>
<style>
.group {
  border: solid black 1px;
  padding: 20px;
  margin: 10px;
  width: max-content;
}
.box {
  padding: 10px;
  width: 100px;
  height: 100px;
  background: red;
  transform: rotateY(60deg);
}
.outer {
  border: solid black 1px;
  display: inline-block;
  width: 200px;
  height: 200px;
  overflow: clip;
}
.container {
  width: 200px;
  height: 200px;
}
.spacer {
  display: inline-block;
  width: 20px;
}
</style>
</head>
<body>
<p>Each grouping below should have two matching boxes.</p>
<div class="group">
  <div class="outer">
    <div class="container" style="perspective: 100px;">
      <div class="box"></div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="outer">
    <div class="container" style="perspective: 100px;">
      <div class="box"></div>
    </div>
  </div>
</div>
<div class="group">
  <div class="outer">
    <div class="container" style="perspective: 100px;">
      <div class="box"></div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="outer">
    <div class="container" style="perspective: 100px;">
      <div class="box"></div>
    </div>
  </div>
</div>
</body>
</html>
