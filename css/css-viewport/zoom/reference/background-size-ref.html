<!DOCTYPE html>
<html>
<head>
<style>
.group {
  border: solid black 1px;
  padding: 20px;
  margin: 10px;
  width: max-content;
}
.outer {
  background-size: 50px;
  display: inline-block;
}
.container {
  background-image: url("/images/pattern.png");
  width: 40px;
  height: 40px;
}
.container-zoom {
  background-image: url("/images/pattern.png");
  width: 80px;
  height: 80px;
}
.spacer {
  display: inline-block;
  width: 20px;
}
</style>
</head>
<body>
<p>Each grouping below should have two matching boxes.</p>
<div class="group">
  <div class="outer">
    <div class="container" style="background-size: 50px;">
    </div>
  </div>
  <div class="spacer"></div>
  <div class="outer">
    <div class="container" style="background-size: 50px;">
    </div>
  </div>
</div>
<div class="group">
  <div class="outer">
    <div class="container-zoom" style="background-size: 100px;">
    </div>
  </div>
  <div class="spacer"></div>
  <div class="outer">
    <div class="container-zoom" style="background-size: 100px;">
    </div>
  </div>
</div>
</body>
</html>
