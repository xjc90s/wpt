<!DOCTYPE html>
<html>
<head>
<title>CSS Zoom applies to row-gap</title>
<link rel="author" title="Sam Weinig" href="mailto:sam@webkit.org">
<link rel="help" href="https://drafts.csswg.org/css-viewport/">
<link rel="match" href="reference/row-gap-ref.html">
<style>
.group {
  border: solid black 1px;
  padding: 20px;
  margin: 10px;
  width: max-content;
}
.outer {
  display: inline-block;
  border: 1px solid black;
  padding: 10px;
  row-gap: 20px;
}
.container {
  display: flex;
  flex-wrap: wrap;
  width: 150px;
}
.container > div {
  background-color: black;
  flex: 1 1 auto;
  width: 100px;
  height: 20px;
}
.spacer {
  display: inline-block;
  width: 20px;
}
</style>
</head>
<body>
<p>Each grouping below should have two matching boxes.</p>
<div class="group">
  <div class="outer">
    <div class="container" style="row-gap: 20px; zoom: 1;">
      <div></div>
      <div></div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="outer">
    <div class="container" style="row-gap: inherit; zoom: 1;">
      <div></div>
      <div></div>
    </div>
  </div>
</div>
<div class="group">
  <div class="outer">
    <div class="container" style="row-gap: 20px; zoom: 2;">
      <div></div>
      <div></div>
    </div>
  </div>
  <div class="spacer"></div>
  <div class="outer">
    <div class="container" style="row-gap: inherit; zoom: 2;">
      <div></div>
      <div></div>
    </div>
  </div>
</div>
</body>
</html>
