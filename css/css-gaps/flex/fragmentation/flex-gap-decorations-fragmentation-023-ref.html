<!DOCTYPE html>
<link rel="help" href="https://github.com/w3c/csswg-drafts/pull/13850">
<link rel="author" title="Sam Davis Omekara Jr." href="mailto:samomekarajr@microsoft.com">
<style>
  body {
    margin: 0;
  }
  .multi-column {
    position: relative;
    columns: 2;
    column-width: 110px;
    column-gap: 10px;
    height: 120px;
    width: 230px;
    background: lightgray;
  }
  #flexbox {
    display: flex;
    flex-wrap: wrap;
    width: 110px;
    row-gap: 10px;
    column-gap: 10px;
  }
  .items {
    background-color: cornflowerblue;
    width: 50px;
    height: 50px;
  }
  .row-rule {
    position: absolute;
    width: 110px;
    height: 10px;
  }
  .col-rule {
    position: absolute;
    width: 10px;
    height: 50px;
    background: purple;
  }
</style>
<div class="multi-column">
  <!-- Frag 1 (left=0): row gap 1 = red. -->
  <div class="row-rule" style="top: 50px; left: 0; background: red;"></div>
  <div class="col-rule" style="top: 0; left: 50px;"></div>
  <div class="col-rule" style="top: 60px; left: 50px;"></div>

  <!-- Frag 2 (left=120): row gap 3 = blue. -->
  <div class="row-rule" style="top: 50px; left: 120px; background: blue;"></div>
  <div class="col-rule" style="top: 0; left: 170px;"></div>
  <div class="col-rule" style="top: 60px; left: 170px;"></div>

  <div id="flexbox">
    <div class="items"></div>
    <div class="items"></div>
    <div class="items"></div>
    <div class="items"></div>
    <div class="items"></div>
    <div class="items"></div>
    <div class="items"></div>
    <div class="items"></div>
  </div>
</div>
