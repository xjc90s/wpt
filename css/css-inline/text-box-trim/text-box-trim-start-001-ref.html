<!DOCTYPE html>
<script src="support/variant-class.js"></script>
<meta charset="utf-8">
<link rel="stylesheet" href="/fonts/baseline-diagnostic/baseline-diagnostic-font.css">
<style>
.spacer {
  background: lightgray;
  block-size: 100px;
}
.target {
  font: 100px/2 BaselineDiagnosticAlphabeticZero;
}
.offset {
  position: relative;
}
.vrl { writing-mode: vertical-rl; }
.vlr { writing-mode: vertical-lr; }
.auto .target, .text .target { block-size: calc(2em - 0.5em); }
.auto .offset, .text .offset { inset-block-start: calc(-0.5em); }
.cap .target { block-size: calc(2em - 0.5em - 1em * var(--baseline-diagnostic-alphabetic-zero-cap-height)); }
.cap .offset { inset-block-start: calc(-0.5em - 1em * var(--baseline-diagnostic-alphabetic-zero-cap-height)); }
.ex .target { block-size: calc(2em - 0.5em - 1em * var(--baseline-diagnostic-alphabetic-zero-x-height)); }
.ex .offset { inset-block-start: calc(-0.5em - 1em * var(--baseline-diagnostic-alphabetic-zero-x-height)); }
.vlr.alphabetic .target { block-size: calc(0.5em + 1em * var(--baseline-diagnostic-alphabetic-zero-alphabetic)); }
.vlr.alphabetic .offset { inset-block-start: calc(-0.5em - 1em * (1 - var(--baseline-diagnostic-alphabetic-zero-alphabetic))); }
</style>
<div class="spacer"></div>
<div class="target">
  <span class="offset">█BxIF</span>
</div>
<div class="spacer"></div>
