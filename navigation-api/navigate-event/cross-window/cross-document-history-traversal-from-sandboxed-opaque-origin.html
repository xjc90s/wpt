<!doctype html>
<script src="/resources/testharness.js"></script>
<script src="/resources/testharnessreport.js"></script>
<body>
<script>

async_test(t => {
  let iframe = document.createElement("iframe");

  window.addEventListener("message", t.step_func(e => {
    if (e.data.type === "attacker_loaded") {
      e.source.postMessage("go_back", "*");
    } else if (e.data.type === "navigate_event") {
      assert_unreached("Navigate event should not be fired because destination origin is opaque and therefore cross-origin.");
    } else if (e.data === "attacker_finished") {
      t.done();
    }
  }));

  iframe.src = "resources/sandboxed-opaque-origin.html";
  document.body.appendChild(iframe);
}, "Navigate event should not fire for cross-document history traversal to a sandboxed document");
</script>
